name: customer_app
description: A Flutter customer service booking application
version: 1.1.12+17
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  image_picker: ^1.2.0
  path_provider: ^2.0.15
  pdf: ^3.10.4
  share_plus: ^10.0.0
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  http: ^1.1.0
  firebase_core: ^3.10.0
  firebase_auth: ^5.7.0
  firebase_app_check: ^0.3.2+10
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  cloud_firestore: ^5.5.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^19.5.0
  firebase_messaging: ^15.1.0
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_padded_v4.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_padded_v4.png"

flutter:
  uses-material-design: true
  generate: true  # Enable localization code generation

  assets:
    - assets/images/
    - assets/fonts/